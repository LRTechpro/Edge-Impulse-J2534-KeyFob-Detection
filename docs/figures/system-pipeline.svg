<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260">
  <rect width="1200" height="260" fill="#f7f9fb"/>
  <style>
    .box { fill:#ffffff; stroke:#234b70; stroke-width:3; rx:16; }
    .title { font:700 22px Arial,sans-serif; fill:#17324d; text-anchor:middle; }
    .sub { font:16px Arial,sans-serif; fill:#465d73; text-anchor:middle; }
    .arrow { stroke:#2f6f9f; stroke-width:5; marker-end:url(#m); }
  </style>
  <defs>
    <marker id="m" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L0,6 L9,3 z" fill="#2f6f9f"/>
    </marker>
  </defs>
  <rect class="box" x="35" y="70" width="185" height="110"/>
  <text class="title" x="127" y="110">OV2640 Camera</text>
  <text class="sub" x="127" y="140">Live image capture</text>
  <line class="arrow" x1="225" y1="125" x2="285" y2="125"/>
  <rect class="box" x="290" y="70" width="210" height="110"/>
  <text class="title" x="395" y="106">Framebuffer</text>
  <text class="sub" x="395" y="136">96 x 96 RGB565</text>
  <text class="sub" x="395" y="159">18,432 bytes</text>
  <line class="arrow" x1="505" y1="125" x2="565" y2="125"/>
  <rect class="box" x="570" y="70" width="205" height="110"/>
  <text class="title" x="672" y="106">Preprocessing</text>
  <text class="sub" x="672" y="138">48 x 48 model input</text>
  <line class="arrow" x1="780" y1="125" x2="840" y2="125"/>
  <rect class="box" x="845" y="70" width="160" height="110"/>
  <text class="title" x="925" y="106">FOMO</text>
  <text class="sub" x="925" y="138">Centroid grid</text>
  <line class="arrow" x1="1010" y1="125" x2="1070" y2="125"/>
  <rect class="box" x="1075" y="70" width="95" height="110"/>
  <text class="title" x="1122" y="106">Serial</text>
  <text class="sub" x="1122" y="137">CSV</text>
  <text class="sub" x="1122" y="160">logs</text>
  <text class="sub" x="600" y="225">Checksum is calculated before inference to verify frame freshness.</text>
</svg>
