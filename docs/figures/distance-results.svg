<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560">
  <rect width="1200" height="560" fill="#f8fafc"/>
  <text x="600" y="48" font-family="Arial,sans-serif" font-size="30" font-weight="700" text-anchor="middle" fill="#17324d">Key-Fob Distance Experiment</text>
  <text x="600" y="82" font-family="Arial,sans-serif" font-size="18" text-anchor="middle" fill="#52677a">30 controlled samples, 22 cm to 44 cm</text>

  <line x1="110" y1="450" x2="110" y2="120" stroke="#334155" stroke-width="3"/>
  <line x1="110" y1="450" x2="1090" y2="450" stroke="#334155" stroke-width="3"/>
  <line x1="110" y1="285" x2="1090" y2="285" stroke="#d7dee7" stroke-width="2" stroke-dasharray="8 8"/>
  <line x1="110" y1="120" x2="1090" y2="120" stroke="#d7dee7" stroke-width="2" stroke-dasharray="8 8"/>

  <text x="80" y="455" font-family="Arial,sans-serif" font-size="16" text-anchor="end" fill="#52677a">0%</text>
  <text x="80" y="290" font-family="Arial,sans-serif" font-size="16" text-anchor="end" fill="#52677a">50%</text>
  <text x="80" y="125" font-family="Arial,sans-serif" font-size="16" text-anchor="end" fill="#52677a">100%</text>

  <rect x="210" y="153" width="170" height="297" rx="10" fill="#3b82f6"/>
  <rect x="515" y="120" width="170" height="330" rx="10" fill="#2563eb"/>
  <rect x="820" y="120" width="170" height="330" rx="10" fill="#1d4ed8"/>

  <text x="295" y="143" font-family="Arial,sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#17324d">90%</text>
  <text x="600" y="110" font-family="Arial,sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#17324d">100%</text>
  <text x="905" y="110" font-family="Arial,sans-serif" font-size="24" font-weight="700" text-anchor="middle" fill="#17324d">100%</text>

  <text x="295" y="488" font-family="Arial,sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#17324d">22 cm</text>
  <text x="600" y="488" font-family="Arial,sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#17324d">33 cm</text>
  <text x="905" y="488" font-family="Arial,sans-serif" font-size="22" font-weight="700" text-anchor="middle" fill="#17324d">44 cm</text>

  <text x="295" y="520" font-family="Arial,sans-serif" font-size="17" text-anchor="middle" fill="#52677a">Avg conf 0.939</text>
  <text x="600" y="520" font-family="Arial,sans-serif" font-size="17" text-anchor="middle" fill="#52677a">Avg conf 0.911</text>
  <text x="905" y="520" font-family="Arial,sans-serif" font-size="17" text-anchor="middle" fill="#52677a">Avg conf 0.908</text>

  <rect x="910" y="28" width="245" height="62" rx="12" fill="#fff7ed" stroke="#f97316" stroke-width="2"/>
  <text x="1032" y="54" font-family="Arial,sans-serif" font-size="17" font-weight="700" text-anchor="middle" fill="#9a3412">Reported size stayed 8 x 8</text>
  <text x="1032" y="76" font-family="Arial,sans-serif" font-size="15" text-anchor="middle" fill="#9a3412">Area remained 64 at all distances</text>
</svg>
